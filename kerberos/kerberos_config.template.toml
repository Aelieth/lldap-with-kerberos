[kerberos]
# Realm will be auto-derived from LLDAP_LDAP_BASE_DN (e.g., dc=homelab,dc=local → HOMELAB.LOCAL)
# Override with LLDAP_KERB_REALM_NAME env if needed.
realm_name = ""

# Base DN shared with LLDAP — auto-set from LLDAP_LDAP_BASE_DN env.
base_dn = ""

ticket_lifetime = "24h"
renew_lifetime = "7d"
forwardable = true
rdns = false

## All values can be overridden with LLDAP_KERB_ prefixed env vars.
## Realm and base_dn are auto-derived for consistency if not overridden.
