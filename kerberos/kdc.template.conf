[kdcdefaults]
    kdc_ports = 750,88

[realms]
    {{ REALM_NAME }} = {
        master_key_type = aes256-cts-hmac-sha1-96
        supported_enctypes = aes256-cts-hmac-sha1-96:normal
    }

[dbdefaults]

[dbmodules]

[logging]
    kdc = FILE:/var/log/krb5/krb5kdc.log
    admin_server = FILE:/var/log/kadmind.log
