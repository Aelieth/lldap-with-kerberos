[kdcdefaults]
    kdc_ports = 750,88

[realms]
    ${REALM_NAME} = {
${DATABASE_MODULE_BLOCK}
        master_key_type = aes256-cts-hmac-sha1-96
        supported_enctypes = aes256-cts-hmac-sha1-96:normal
    }

[dbdefaults]

[dbmodules]
${CONTACT_LDAP}

[logging]
    kdc = FILE:/var/log/krb5/krb5kdc.log
    admin_server = FILE:/var/log/krb5/kadmind.log
