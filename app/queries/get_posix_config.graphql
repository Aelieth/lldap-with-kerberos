query GetPosixConfig {
  posixSettings {
    userUidnumberAssign
    userUidnumberStart
    userUidnumberMax
    userGidnumberAssign
    userGidnumberStart
    userLoginshellAssign
    userLoginshellDefault
    userHomedirectoryAssign
    userHomedirectoryPrefix
    groupGidnumberAssign
    groupGidnumberStart
    groupGidnumberMax
  }
}
