query ListUsersQuery($where: RequestFilter) {
  users(where: $where) {
    id
    email
    displayName
    creationDate
    isDisabled
    attributes {
      schema {
        name
      }
      value
    }
  }
}

query ListUserNames($where: RequestFilter) {
  users(where: $where) {
    id
    displayName
  }
}
